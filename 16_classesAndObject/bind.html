<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button>
        Button Clicked
    </button>
    
</body>
<script>
    // The bind method in JavaScript is a powerful tool that allows you to create a new function with a specific this value and initial arguments. This method is particularly useful when dealing with callbacks and ensuring that the correct context is maintained.
    class React {
        constructor(){
            this.library = "Ract";
            this.server = "https://localhost:300"
            // requirement 
            // button ka reff mil jaye and click krne pe kuch ho
            document
                .querySelector('button')
                .addEventListener('click' , this.handleClick.bind(this))
                // ye bina bind ke kyun nhi ch rha hai
// bind ke bina this = button ban raha hai
// 👉 button ke andar server property hoti hi nahi
// 👉 isliye tu this.server access nahi kar paa raha;

        }
        handleClick(){
            console.log("button Clicked");
            console.log(this.server);
        }
    }
    const app = new React();


</script>
