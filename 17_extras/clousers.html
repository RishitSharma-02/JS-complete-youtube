// ab hm clouser dekhte hai  
//  Closure = function + uska outer scope ka access (even after outer function khatam ho gaya ho)
function outer() {
  let count = 0;

  function inner() {
    count++;
    console.log(count);
  }

  return inner;// yaha pr ake outer khatam ho gya 
  //inner return krne se sirf inner nhi jaa rha balki uska pura lexical scope ja rha hai 
  //  ise hua kya ise hua ye ki count hoga abhi bhi memory mai
}

const fn = outer();

fn(); // 1
fn(); // 2
fn(); // 3
