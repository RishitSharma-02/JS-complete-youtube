<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>  chai and code |DOM</title>
</head>
<body style="background-color: black; color: antiquewhite;">
<ul class="parent">
    <li>JavaScript</li>
</ul>    
</body>
<script>
    function addLang (langNm){
        const li = document.createElement('li')
        li.innerHTML = `${langNm}`;
        document.querySelector('.parent').appendChild(li)
    }
    addLang("python")
    addLang("java advance")

    // more optimize way
    function optiLang (langNM){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langNM))
        document.querySelector('.parent').appendChild(li)
    }
    optiLang("Rust")

    //edit
  const secondLang =  document.querySelector("li:nth-child(2)")
 
secondLang.innerHTML = "mojo";

const newli = document.createElement('li');
newli.textContent = "new_way"
secondLang.replaceWith(newli)
//edit
const firstLang = document.querySelector("li:first-child")
    const newli1 = document.createElement("li")
    newli1.textContent= "type-script"
    firstLang.replaceWith(newli1);
    //remove 
    const lastLang = document.querySelector('li:last-child')
    lastLang.remove();
    




</script> 
</html>
